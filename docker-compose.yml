services:
  # ── PostgreSQL + pgvector ─────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-market_agent}
      POSTGRES_USER: ${POSTGRES_USER:-market_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-market_agent}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - market-net

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - market-net

  # ── Adminer (optional DB UI) ──────────────────────────────────────────────
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - market-net
    profiles:
      - tools          # only starts with: docker compose --profile tools up

  # ── vLLM (production inference server) ───────────────────────────────────
  # Requires NVIDIA GPU + nvidia-container-toolkit installed on the host.
  # Uncomment when ready to use GPU-accelerated inference.
  #
  # vllm:
  #   image: vllm/vllm-openai:latest
  #   restart: unless-stopped
  #   ports:
  #     - "8000:8000"
  #   volumes:
  #     - vllm_models:/root/.cache/huggingface
  #   command: ["--model", "mistralai/Mistral-7B-Instruct-v0.2", "--host", "0.0.0.0"]
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 12
  #     start_period: 60s
  #   networks:
  #     - market-net

volumes:
  postgres_data:
  redis_data:
  # vllm_models:    # uncomment with vllm service

networks:
  market-net:
    driver: bridge
